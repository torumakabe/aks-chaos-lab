apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

components:
- ../components/cilium-ingress-l7

resources:
- serviceaccount.yaml
- deployment.yaml
- service.yaml
- gateway.yaml
- gateway-options-configmap.yaml
- httproute.yaml
- hpa.yaml
- pdb.yaml
- ciliumnetworkpolicy-egress-allowlist.yaml
- addon-vpa.yaml
- instrumentation.yaml
- cronjob-synthetic-traffic.yaml

configMapGenerator:
- envs:
  - .env
  literals:
  - APP_PORT=8000
  - LOG_LEVEL=INFO
  - REDIS_ENABLED=true
  - TELEMETRY_ENABLED=true
  - CUSTOM_METRICS_ENABLED=true
  - TELEMETRY_SAMPLING_RATE=0.1
  name: app-config
  namespace: chaos-lab
  options:
    disableNameSuffixHash: true

replacements:
- source:
    fieldPath: data.AZURE_CHAOS_APP_IDENTITY_CLIENT_ID
    kind: ConfigMap
    name: app-config
  targets:
  - fieldPaths:
    - metadata.annotations.[azure.workload.identity/client-id]
    options:
      create: true
    select:
      kind: ServiceAccount
      name: chaos-app-sa
      namespace: chaos-lab
- source:
    fieldPath: data.AZURE_INGRESS_FQDN
    kind: ConfigMap
    name: app-config
  targets:
  - fieldPaths:
    - spec.listeners.0.hostname
    select:
      group: gateway.networking.k8s.io
      kind: Gateway
      name: chaos-app
      namespace: chaos-lab
- source:
    fieldPath: data.AZURE_RESOURCE_GROUP
    kind: ConfigMap
    name: app-config
  targets:
  - fieldPaths:
    - metadata.annotations.[service.beta.kubernetes.io/azure-load-balancer-resource-group]
    options:
      create: true
    select:
      group: gateway.networking.k8s.io
      kind: Gateway
      name: chaos-app
      namespace: chaos-lab
- source:
    fieldPath: data.AZURE_INGRESS_PUBLIC_IP_NAME
    kind: ConfigMap
    name: app-config
  targets:
  - fieldPaths:
    - metadata.annotations.[service.beta.kubernetes.io/azure-pip-name]
    options:
      create: true
    select:
      group: gateway.networking.k8s.io
      kind: Gateway
      name: chaos-app
      namespace: chaos-lab
- source:
    fieldPath: data.APPLICATIONINSIGHTS_CONNECTION_STRING
    kind: ConfigMap
    name: app-config
  targets:
  - fieldPaths:
    - spec.destination.applicationInsightsConnectionString
    select:
      group: monitor.azure.com
      kind: Instrumentation
      name: chaos-app-otel
      namespace: chaos-lab
patches:
- patch: |-
    - op: replace
      path: /metadata/name
      value: chaos-app-ingress-l7
    - op: replace
      path: /metadata/namespace
      value: chaos-lab
    - op: replace
      path: /metadata/labels/app.kubernetes.io~1name
      value: chaos-app
    - op: replace
      path: /metadata/labels/app.kubernetes.io~1instance
      value: chaos-app
    - op: replace
      path: /metadata/labels/app.kubernetes.io~1part-of
      value: aks-chaos-lab
    - op: add
      path: /metadata/labels/app.kubernetes.io~1version
      value: "0.1.0"
    - op: replace
      path: /spec/endpointSelector/matchLabels/app
      value: chaos-app
    - op: replace
      path: /spec/ingress/0/fromEndpoints/0/matchLabels/gateway.networking.k8s.io~1gateway-name
      value: chaos-app
    - op: add
      path: /spec/ingress/0/toPorts/0/rules/http/-
      value:
        method: "GET"
        path: "^/health$"
  target:
    group: cilium.io
    kind: CiliumNetworkPolicy
    name: app-ingress-l7
    version: v2
images:
- name: placeholder
  newName: acr5dua5pkulsr3e.azurecr.io/aks-chaos-lab/api-eval
  newTag: azd-deploy-1776165518
