apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chaos-app-allow-from-ingress
  namespace: chaos-lab
  labels:
    app.kubernetes.io/name: chaos-app
    app.kubernetes.io/instance: chaos-app
    app.kubernetes.io/part-of: aks-chaos-lab
    app.kubernetes.io/component: networkpolicy
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/version: "0.1.0"
spec:
  podSelector:
    matchLabels:
      app: chaos-app
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from the Gateway API (App Routing Istio) Envoy proxy
    - from:
        - podSelector:
            matchLabels:
              gateway.networking.k8s.io/gateway-name: chaos-app
      ports:
        - protocol: TCP
          port: 8000
    # Allow Prometheus scraping from kube-system (ama-metrics)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8000
