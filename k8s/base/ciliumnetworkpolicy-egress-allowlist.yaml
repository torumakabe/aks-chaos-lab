apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: chaos-app-egress-allowlist
  namespace: chaos-lab
  labels:
    app.kubernetes.io/name: chaos-app
    app.kubernetes.io/instance: chaos-app
    app.kubernetes.io/part-of: aks-chaos-lab
    app.kubernetes.io/component: networkpolicy
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/version: "0.1.0"
spec:
  endpointSelector:
    matchLabels:
      app: chaos-app
  egress:
    # Allow DNS queries from chaos-app pods to CoreDNS (kube-dns)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              # Limit DNS lookups to necessary targets
              - matchPattern: "*.*.redis.azure.net"
              - matchName: "login.microsoftonline.com"
    # Allow DNS queries to Chaos Mesh DNS (chaos-mesh-dns-server)
    # Note: L7 DNS filters are intentionally omitted to ensure queries reach Chaos DNS.
    - toServices:
        - k8sService:
            namespace: chaos-testing
            serviceName: chaos-mesh-dns-server
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Allow direct egress to any Pod in chaos-testing namespace on 53/UDP,TCP (covers service translation to Pod IP)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: chaos-testing
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Additional rule: Allow egress to Chaos DNS Server specifically by component label
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: chaos-testing
            k8s:app.kubernetes.io/component: chaos-dns-server
      toPorts:
        - ports:
            - port: "5353"
              protocol: UDP
            - port: "5353"
              protocol: TCP
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Fallback: allow direct egress to chaos-dns ClusterIP (service IP may change).
    - toCIDRSet:
        - cidr: 10.0.117.108/32
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
            - port: "5353"
              protocol: UDP
            - port: "5353"
              protocol: TCP
    # Allow broader Chaos Mesh communication (gRPC, metrics, etc.)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: chaos-testing
      toPorts:
        - ports:
            - port: "9153"
              protocol: TCP
            - port: "9288"
              protocol: TCP
    # Allow egress to Azure Managed Redis (Enterprise) database port
    - toFQDNs:
        - matchPattern: "*.*.redis.azure.net"
      toPorts:
        - ports:
            - port: "10000"
              protocol: TCP
    # Allow egress to AKS OTLP Collector Pods for telemetry export
    # hostPort DNAT causes Cilium to see Pod-to-Pod traffic (not host entity),
    # so we target the actual collector Pods by label instead of toEntities: host.
    # Port is not specified because containerPort varies across AKS SKU modes
    # (e.g., Base vs Automatic) and may change with AKS updates.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:component: ama-logs-agent
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:dsName: ama-metrics-node
    # Allow egress to Azure Entra ID for Workload Identity token acquisition
    - toFQDNs:
        - matchName: "login.microsoftonline.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: synthetic-traffic-egress-allowlist
  namespace: chaos-lab
  labels:
    app.kubernetes.io/name: synthetic-traffic
    app.kubernetes.io/instance: synthetic-traffic
    app.kubernetes.io/part-of: aks-chaos-lab
    app.kubernetes.io/component: networkpolicy
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/version: "0.1.0"
spec:
  # Independent endpointSelector from chaos-app: only matches synthetic-traffic
  # CronJob Pods so the policy lifecycle is decoupled.
  endpointSelector:
    matchLabels:
      app: synthetic-traffic
  egress:
    # Allow DNS resolution of the AKS Istio addon Gateway-managed Service FQDN via CoreDNS.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              # matchName: ndots:5 search domain 試行で発生する非 absolute query を確実に許可する。
              - matchName: "chaos-app-approuting-istio.chaos-lab.svc.cluster.local"
              # matchPattern: 同 namespace 内の他 Service への将来的な解決余地を残す。
              - matchPattern: "*.chaos-lab.svc.cluster.local"
    # Allow HTTP to the AKS Istio addon Gateway-managed Envoy Pods on port 80.
    # The Gateway controller deploys these Pods in the same namespace as the Gateway
    # resource (chaos-lab), labeled with gateway.networking.k8s.io/gateway-name=chaos-app.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: chaos-lab
            k8s:gateway.networking.k8s.io/gateway-name: chaos-app
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
