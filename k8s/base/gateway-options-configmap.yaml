apiVersion: v1
kind: ConfigMap
metadata:
  name: chaos-app-gw-options
  namespace: chaos-lab
  labels:
    app.kubernetes.io/name: chaos-app
    app.kubernetes.io/instance: chaos-app
    app.kubernetes.io/part-of: aks-chaos-lab
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/version: "0.1.0"
data:
  deployment: |
    spec:
      template:
        metadata:
          annotations:
            proxy.istio.io/config: |
              proxyStatsMatcher:
                inclusionPrefixes:
                  - "cluster.outbound|80||chaos-app.chaos-lab.svc.cluster.local"
                inclusionRegexps:
                  - ".*upstream_rq.*"
                  - ".*upstream_cx_total.*"
