# Platform Integration Test Workflow
# Manual trigger for full-stack integration testing with temporary Azure environment

name: Platform Integration Test

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test (leave empty to use triggering branch)'
        required: false
        default: ''
        type: string
      test_scope:
        description: 'Test scope'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - infra-only
          - app-only
      aks_sku:
        description: 'AKS SKU mode'
        required: false
        default: 'Base'
        type: choice
        options:
          - Base
          - Automatic

concurrency:
  group: integration-test
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_ENV_NAME: inttest-${{ github.run_id }}
  AZURE_LOCATION: japaneast

jobs:
  validate:
    name: Validate Bicep Templates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: integration-test
    outputs:
      env_name: ${{ env.AZURE_ENV_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch || github.ref_name }}

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep Templates
        run: |
          echo "::group::Bicep Build"
          az bicep build --file infra/main.bicep
          echo "::endgroup::"

          echo "::group::ARM Deployment Validation"
          az deployment sub validate \
            --location "${{ env.AZURE_LOCATION }}" \
            --template-file infra/main.bicep \
            --parameters location="${{ env.AZURE_LOCATION }}"
          echo "::endgroup::"

          {
            echo "## ✅ Bicep Validation Passed"
            echo "- Branch: \`${{ inputs.branch || github.ref_name }}\`"
            echo "- Run ID: \`${{ github.run_id }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  provision-and-deploy:
    name: Provision and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: validate
    if: (inputs.test_scope || 'full') != 'app-only'
    environment: integration-test
    outputs:
      resource_group: ${{ steps.provision.outputs.resource_group }}
      ingress_fqdn: ${{ steps.provision.outputs.ingress_fqdn }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch || github.ref_name }}

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@634ad924cf8baef2257898ba5663be8d19f15aca # v2.3.0

      - name: Install kubelogin
        uses: Azure/use-kubelogin@0ce7c36141aa27d4934872cf00b0120804c98a29 # v1.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to azd
        run: azd auth login --client-id ${{ secrets.AZURE_CLIENT_ID }} --federated-credential-provider github --tenant-id ${{ secrets.AZURE_TENANT_ID }}

      - name: Configure azd alpha features
        run: |
          azd config set alpha.aks.helm on
          azd config set alpha.aks.kustomize on

      - name: Initialize azd environment
        run: |
          echo "::group::azd env new"
          azd env new ${{ env.AZURE_ENV_NAME }} --no-prompt
          azd env set AZURE_LOCATION ${{ env.AZURE_LOCATION }}
          azd env set AZURE_SUBSCRIPTION_ID ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azd env set AKS_SKU_NAME ${{ inputs.aks_sku || 'Base' }}
          echo "::endgroup::"

      - name: Provision infrastructure
        id: provision
        run: |
          echo "::group::azd provision"
          azd provision --no-prompt || {
            {
              echo "## ❌ Provision Failed"
              echo "Run ID: \`${{ github.run_id }}\`"
              echo "Environment: \`${{ env.AZURE_ENV_NAME }}\`"
              echo "Check the logs above for details."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }
          echo "::endgroup::"

          # Output resource group and ingress FQDN for subsequent jobs
          RESOURCE_GROUP=$(azd env get-value AZURE_RESOURCE_GROUP)
          INGRESS_FQDN=$(azd env get-value AZURE_INGRESS_FQDN)
          {
            echo "resource_group=$RESOURCE_GROUP"
            echo "ingress_fqdn=$INGRESS_FQDN"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## ✅ Provision Completed"
            echo "- Resource Group: \`$RESOURCE_GROUP\`"
            echo "- AKS SKU: \`${{ inputs.aks_sku || 'Base' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy application
        if: (inputs.test_scope || 'full') != 'infra-only'
        run: |
          echo "::group::azd deploy"
          azd deploy --no-prompt || {
            {
              echo "## ❌ Deploy Failed"
              echo "Run ID: \`${{ github.run_id }}\`"
              echo "Check the logs above for details."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }
          echo "::endgroup::"

          {
            echo "## ✅ Deploy Completed"
            echo "- Ingress FQDN: \`${{ steps.provision.outputs.ingress_fqdn }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: provision-and-deploy
    if: (inputs.test_scope || 'full') == 'full'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch || github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Smoke test - Health endpoint
        env:
          INGRESS_FQDN: ${{ needs.provision-and-deploy.outputs.ingress_fqdn }}
        run: |
          echo "::group::Smoke Test - /health"

          # Retry loop - wait for ingress and app to be ready
          MAX_RETRIES=12
          RETRY_INTERVAL=30
          RETRY_COUNT=0
          HTTP_STATUS="000"

          echo "Waiting for application to be ready at https://${INGRESS_FQDN}/health"

          while [ "$RETRY_COUNT" -lt "$MAX_RETRIES" ]; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${INGRESS_FQDN}/health" --max-time 30 -k || echo "000")
            echo "Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES: HTTP $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed (HTTP $HTTP_STATUS)"
              {
                echo "## ✅ Smoke Test Passed"
                echo "- Endpoint: \`https://${INGRESS_FQDN}/health\`"
                echo "- Status: HTTP $HTTP_STATUS"
                echo "- Attempts: $((RETRY_COUNT + 1))"
              } >> "$GITHUB_STEP_SUMMARY"
              echo "::endgroup::"
              exit 0
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ "$RETRY_COUNT" -lt "$MAX_RETRIES" ]; then
              echo "Waiting ${RETRY_INTERVAL}s before next attempt..."
              sleep "$RETRY_INTERVAL"
            fi
          done

          echo "Health check failed after $MAX_RETRIES attempts (last HTTP $HTTP_STATUS)"
          {
            echo "## ❌ Smoke Test Failed"
            echo "- Endpoint: \`https://${INGRESS_FQDN}/health\`"
            echo "- Status: HTTP $HTTP_STATUS"
            echo "- Attempts: $MAX_RETRIES"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"
          exit 1

      - name: Run platform integration tests
        env:
          INTEGRATION_TEST_URL: https://${{ needs.provision-and-deploy.outputs.ingress_fqdn }}
        run: |
          echo "::group::Platform Integration Tests"
          cd src
          uv sync --group dev
          PYTHONPATH=. uv run pytest tests/integration/test_platform.py -v --tb=short || {
            {
              echo "## ❌ Integration Tests Failed"
              echo "Check the logs above for details."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }
          echo "::endgroup::"

          echo "## ✅ Integration Tests Passed" >> "$GITHUB_STEP_SUMMARY"

  cleanup:
    name: Cleanup Resources
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [validate, provision-and-deploy, test]
    if: always() && needs.provision-and-deploy.result != 'skipped'
    environment: integration-test
    steps:
      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete resource group
        run: |
          echo "::group::Cleanup Resources"
          # Use predictable resource group name based on run_id
          # This ensures cleanup works even if provision job failed mid-way
          RESOURCE_GROUP="rg-aks-chaos-lab-inttest-${{ github.run_id }}"

          echo "Checking for resource group: $RESOURCE_GROUP"
          if az group exists --name "$RESOURCE_GROUP" | grep -q true; then
            echo "Deleting resource group: $RESOURCE_GROUP"
            az group delete --name "$RESOURCE_GROUP" --yes --no-wait || true
            echo "Resource group deletion initiated (async)"
          else
            echo "Resource group does not exist or already deleted"
          fi
          echo "::endgroup::"

          {
            echo "## 🧹 Cleanup Completed"
            echo "- Resource Group: \`$RESOURCE_GROUP\`"
          } >> "$GITHUB_STEP_SUMMARY"
