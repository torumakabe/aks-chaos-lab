# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: aks-chaos-lab

infra:
  layers:
    - name: base
      path: ./infra
    - name: sli
      path: ./infra/sli

workflows:
  up:
    steps:
      - azd: provision base
      - azd: deploy api
      - azd: deploy observability
      - azd: deploy chaos-mesh
      - azd: provision sli

hooks:
  predown:
    posix:
      shell: sh
      run: CONFIRM_DELETE_AZURE_MONITOR_SLI_RESOURCES=true ./scripts/cleanup-azure-monitor-sli-resources.sh pre
      interactive: false
  postdown:
    posix:
      shell: sh
      run: CONFIRM_DELETE_AZURE_MONITOR_SLI_RESOURCES=true ./scripts/cleanup-azure-monitor-sli-resources.sh post
      interactive: false

services:
  api:
    project: src
    language: python
    host: aks
    k8s:
      namespace: chaos-lab
      kustomize:
        dir: ../k8s/base
        env:
          AZURE_CHAOS_APP_IDENTITY_CLIENT_ID: ${AZURE_CHAOS_APP_IDENTITY_CLIENT_ID}
          AZURE_INGRESS_FQDN: ${AZURE_INGRESS_FQDN}
          AZURE_INGRESS_PUBLIC_IP_NAME: ${AZURE_INGRESS_PUBLIC_IP_NAME}
          AZURE_RESOURCE_GROUP: ${AZURE_RESOURCE_GROUP}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
          AZURE_REDIS_HOST: ${AZURE_REDIS_HOST}
          AZURE_REDIS_PORT: ${AZURE_REDIS_PORT}
        edits:
          - set image placeholder=${SERVICE_API_IMAGE_NAME}
  observability:
    project: .
    host: aks
    hooks:
      postdeploy:
        posix:
          shell: sh
          run: ./scripts/warm-up-sli-signals.sh
          interactive: false
    k8s:
      namespace: kube-system
      kustomize:
        dir: k8s/observability
  chaos-mesh:
    project: .
    host: aks
    k8s:
      namespace: chaos-testing
      helm:
        repositories:
          - name: chaos-mesh
            url: https://charts.chaos-mesh.org
        releases:
          - name: chaos-mesh
            chart: chaos-mesh/chaos-mesh
            version: 2.8.1
            values: infra/helm/chaos-mesh-values.yaml
