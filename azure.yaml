# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: aks-chaos-lab

infra:
  layers:
    - name: base
      path: ./infra
    - name: sli
      path: ./infra/sli
      hooks:
        preprovision:
          windows:
            run: uv run ..\..\scripts\wait-for-external-sli-signals.py
            interactive: false
          posix:
            run: uv run ../../scripts/wait-for-external-sli-signals.py
            interactive: false
workflows:
  up:
    steps:
      - azd: provision base
      - azd: deploy api-instrumentation
      - azd: deploy api
      - azd: deploy observability
      - azd: deploy chaos-mesh
      - azd: deploy external-sli-publisher
      - azd: provision sli

hooks:
  predown:
    windows:
      run: uv run scripts/cleanup-azure-monitor-sli-resources.py
      interactive: false
    posix:
      run: uv run scripts/cleanup-azure-monitor-sli-resources.py
      interactive: false

services:
  api-instrumentation:
    project: .
    host: aks
    resourceName: ${AZURE_AKS_CLUSTER_NAME}
    hooks:
      predeploy:
        windows:
          run: uv run scripts\wait-for-aks-readiness.py
          interactive: false
        posix:
          run: uv run scripts/wait-for-aks-readiness.py
          interactive: false
      postdeploy:
        windows:
          run: uv run scripts\check-api-otel-injection.py wait-instrumentation
          interactive: false
        posix:
          run: uv run scripts/check-api-otel-injection.py wait-instrumentation
          interactive: false
    k8s:
      namespace: chaos-lab
      kustomize:
        dir: k8s/apps/chaos-app/instrumentation
        env:
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
  api:
    project: src/api
    language: python
    host: aks
    resourceName: ${AZURE_AKS_CLUSTER_NAME}
    docker:
      path: Dockerfile
      context: ../..
      # azd does not env-expand docker.platform; keep this in sync with the AKS node architecture.
      platform: linux/arm64
    hooks:
      predeploy:
        windows:
          run: uv run ..\..\scripts\check-api-otel-injection.py require-instrumentation
          interactive: false
        posix:
          run: uv run ../../scripts/check-api-otel-injection.py require-instrumentation
          interactive: false
      postdeploy:
        windows:
          run: uv run ..\..\scripts\check-api-otel-injection.py check-injected
          interactive: false
        posix:
          run: uv run ../../scripts/check-api-otel-injection.py check-injected
          interactive: false
    k8s:
      namespace: chaos-lab
      kustomize:
        dir: ../../k8s/apps/chaos-app
        env:
          AZURE_CHAOS_APP_IDENTITY_CLIENT_ID: ${AZURE_CHAOS_APP_IDENTITY_CLIENT_ID}
          AZURE_INGRESS_FQDN: ${AZURE_INGRESS_FQDN}
          AZURE_INGRESS_PUBLIC_IP_NAME: ${AZURE_INGRESS_PUBLIC_IP_NAME}
          AZURE_RESOURCE_GROUP: ${AZURE_RESOURCE_GROUP}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
          AZURE_REDIS_HOST: ${AZURE_REDIS_HOST}
          AZURE_REDIS_PORT: ${AZURE_REDIS_PORT}
        edits:
          - set image placeholder=${SERVICE_API_IMAGE_NAME}
  observability:
    project: .
    host: aks
    resourceName: ${AZURE_AKS_CLUSTER_NAME}
    k8s:
      namespace: kube-system
      kustomize:
        dir: k8s/observability
  external-sli-publisher:
    project: src/external-sli-publisher
    language: python
    host: function
    resourceName: ${AZURE_EXTERNAL_SLI_FUNCTION_APP_NAME}
  chaos-mesh:
    project: .
    host: aks
    resourceName: ${AZURE_AKS_CLUSTER_NAME}
    k8s:
      namespace: chaos-testing
      helm:
        repositories:
          - name: chaos-mesh
            url: https://charts.chaos-mesh.org
        releases:
          - name: chaos-mesh
            chart: chaos-mesh/chaos-mesh
            version: 2.8.1
            values: infra/helm/chaos-mesh-values.yaml
